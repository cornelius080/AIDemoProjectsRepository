services:
  tts-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tts-kokoro82m:v6.8
    container_name: tts_container
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - FLET_SECRET_KEY=${FLET_SECRET_KEY:-flet_secret_key_placeholder}
      - DOCKER_RUNNING=true
    volumes:
      - ./downloads:/app/downloads
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
