# =============================================================================
# Docker Compose for RAG Web Research Assistant
# =============================================================================
# Usage: docker-compose up -d
# Access: http://localhost:8501

services:
  rag-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-web-assistant
    ports:
      - "8501:8501"
    environment:
      # API Keys - replace with your actual keys or use a secrets manager
      # NOTE: For production, consider using Docker secrets or a vault
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      
      # Streamlit configuration
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
    volumes:
      # Mount apy_keys.env to allow saving API keys from UI
      # The file must be writable (remove :ro flag)
      - ./apy_keys.env:/app/apy_keys.env
      
      # Optional: Mount custom environment file
      # - ./custom_env.env:/app/custom_env.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s