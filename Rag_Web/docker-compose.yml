# =============================================================================
# Docker Compose for RAG Web Research Assistant
# =============================================================================
# Usage: docker-compose up -d
# Access: http://localhost:8501

services:
  rag-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
    image: rag-web:latest
    container_name: rag-web
    ports:
      - "8501:8501"
    env_file:
      - ./config/.env
    environment:
      # App configuration
      - ENV_FILE_PATH=/app/config/.env
      
      # Streamlit configuration
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
    volumes:
      # Map the config directory that contains the .env file
      - ./config:/app/config
    depends_on:
      - ollama-engine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ollama-engine:
    image: ollama/ollama:latest
    container_name: ollama-engine
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: