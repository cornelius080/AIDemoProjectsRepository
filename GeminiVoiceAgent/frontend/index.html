<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Live — Voice Agent</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-wrapper">

    <!-- ===== Header ===== -->
    <header class="app-header">
      <span class="app-title">✦ Gemini Live Agent</span>
      <div class="header-controls">
        <!-- Status pill -->
        <div id="statusPill" class="status-pill" aria-live="polite">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Disconnected</span>
        </div>
        <!-- Connect / Disconnect -->
        <button id="connectBtn" class="btn btn-connect">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          Connect
        </button>
        <button id="disconnectBtn" class="btn btn-disconnect" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Disconnect
        </button>
      </div>
    </header>

    <!-- ===== Chat panel ===== -->
    <section class="chat-panel" aria-label="Conversation">
      <div class="chat-log" id="chatLog" role="log" aria-live="polite">
        <!-- Empty state -->
        <div class="chat-empty" id="emptyState">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <p>Connect and start the conversation</p>
        </div>
      </div>

      <!-- Text input bar -->
      <div class="input-bar">
        <!-- Mic toggle button -->
        <button id="micBtn" class="btn btn-mic" disabled aria-label="Toggle microphone" title="Toggle microphone">
          <!-- Mic ON icon -->
          <svg id="micIconOn" width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <!-- Mic MUTED icon (hidden by default) -->
          <svg id="micIconOff" width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round"
               style="display:none">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
            <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <input
          type="text"
          id="textInput"
          class="text-input"
          placeholder="Type a message or use the mic…"
          disabled
          aria-label="Message input"
        />
        <button id="sendBtn" class="btn btn-send" disabled aria-label="Send message">
          <!-- Paper-plane icon -->
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </section>

  </div>

  <script src="./app.js"></script>
</body>
</html>
